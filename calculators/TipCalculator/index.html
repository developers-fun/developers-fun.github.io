<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link href="/css/TipCalculator.css" rel="stylesheet" />
  </head>
  <body>
    <div class="navbar">
      <a href="/" style="text-decoration: none;"><d1 class="navbarTitle">evaluation.tools</d1></a>
    </div>
    <center>
      <div class="Box">
        <d1 class="BoxTitle">Tip Calculator</d1>
        <input 
          class="BoxInput" 
          id="TipInput" 
          placeholder="Enter bill amount" 
          type="number"
          min="0"
          step="0.01"
        />
        <table>
          <tr>
              <th>Tip %</th>
              <th>Tip Amount</th>
              <th>Total Bill</th>
          </tr>
          <tr>
              <th>5%</th>
              <th id="5Amount">$0.00</th>
              <th id="5Total">$0.00</th>
          </tr>
          <tr>
              <th>10%</th>
              <th id="10Amount">$0.00</th>
              <th id="10Total">$0.00</th>
          </tr>
          <tr>
              <th>13%</th>
              <th id="13Amount">$0.00</th>
              <th id="13Total">$0.00</th>
          </tr>
          <tr>
              <th>15%</th>
              <th id="15Amount">$0.00</th>
              <th id="15Total">$0.00</th>
          </tr>
          <tr>
              <th>18%</th>
              <th id="18Amount">$0.00</th>
              <th id="18Total">$0.00</th>
          </tr>
          <tr>
              <th>20%</th>
              <th id="20Amount">$0.00</th>
              <th id="20Total">$0.00</th>
          </tr>
          <tr>
              <th>25%</th>
              <th id="25Amount">$0.00</th>
              <th id="25Total">$0.00</th>
          </tr>
        </table>
      </div>
    </center>
    <script src="/js/TipCalculator.js"></script>
  </body>
</html>

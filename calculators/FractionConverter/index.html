<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Converter</title>
    <link href="/css/fractionConverter.css" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <a href="/"><d1 class="navbarTitle">Easy-Useful.Tools</d1></a>
    </div>

    <center>
        <div class="Converter">
            <d1 class="SectionTitle">Inproper Fractions</d1>
            <input class="fractionNumerator" id="num" placeholder="Num">
            <hr class="line">
            <input class="fractionDenomenator" id="den" placeholder="Den">
            <button class="submitButton" onclick="convertToMixed()">Convert</button>
            <button class="result">Results</button>
        </div>
    </center>
    <div class="advertisement">
        <d1 class="advertisment"></d1>
    </div>
    <script src="/js/fractionConverter.js" async></script>
</body>
</html>
